---
# =============================================================
#  Ansible Playbook: Opret opdateringsbruger og opdater Pi'er
#  Kør med: ansible-playbook playbooks/setup_and_update.yml
#            -u pi --ask-become-pass
# =============================================================

# -------------------------------------------------------
# FASE 1: Opret updater-brugeren med pi-brugeren
# -------------------------------------------------------
- name: Fase 1 — Opret dedikeret opdateringsbruger
  hosts: raspberrypis
  become: true
  vars:
    update_user: "updater"
    update_user_key: "{{ lookup('file', '~/.ssh/id_ed25519_updater.pub') }}"

  tasks:

    - name: Opret updater-bruger uden interaktiv shell
      user:
        name: "{{ update_user }}"
        shell: /usr/sbin/nologin
        create_home: yes
        password: "!"             # låst password — kun SSH-nøgle virker

    - name: Tilføj SSH-nøgle til updater-brugeren
      authorized_key:
        user: "{{ update_user }}"
        key: "{{ update_user_key }}"
        state: present

    - name: Opret sudoers-regel (kun apt og reboot, intet andet)
      copy:
        dest: /etc/sudoers.d/updater
        content: |
          updater ALL=(ALL) NOPASSWD: /usr/bin/apt-get update
          updater ALL=(ALL) NOPASSWD: /usr/bin/apt-get upgrade *
          updater ALL=(ALL) NOPASSWD: /usr/bin/apt-get dist-upgrade *
          updater ALL=(ALL) NOPASSWD: /usr/bin/apt-get autoremove *
          updater ALL=(ALL) NOPASSWD: /usr/bin/apt-get autoclean
          updater ALL=(ALL) NOPASSWD: /sbin/reboot
        validate: /usr/sbin/visudo -cf %s   # validér syntaks inden gem
        mode: '0440'

    - name: Bekræft at brugeren er oprettet
      debug:
        msg: "✅ Bruger 'updater' er oprettet på {{ inventory_hostname }}"


# -------------------------------------------------------
# FASE 2: Kør opdatering med updater-brugeren
# -------------------------------------------------------
- name: Fase 2 — Opdater alle Raspberry Pi'er
  hosts: raspberrypis
  become: true
  serial: 1             # opdater én Pi ad gangen

  vars:
    ansible_user: updater
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_updater

  tasks:

    - name: Opdater pakkeliste (apt update)
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Opgrader alle pakker (apt dist-upgrade)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Tjek om genstart er nødvendig
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Genstart hvis nødvendigt
      reboot:
        msg: "Genstart påkrævet efter opdatering"
        reboot_timeout: 120
      when: reboot_required.stat.exists

    - name: Opdatering færdig
      debug:
        msg: "✅ {{ inventory_hostname }} er opdateret og klar"
